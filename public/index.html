<!DOCTYPE html>
<html lang="en">
<head>

<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Land of Legacy"/>
<meta name="theme-color" content="#050507"/>
<title>Land of Legacy</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23050507' width='100' height='100' rx='22'/><text x='50' y='65' text-anchor='middle' font-size='50' fill='%23C9A84C'>◈</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#050507;--bg-card:rgba(10,11,16,.75);--bg-card2:rgba(10,11,16,.7);--bg-subtle:rgba(255,255,255,.015);--bg-hover:rgba(255,255,255,.02);--bg-nav:rgba(5,5,7,.97);--bg-modal:#0A0B10;--text:#E2E4EA;--text-dim:#4A5060;--text-muted:#3E4250;--text-dark:#2D3040;--text-darker:#252830;--text-darkest:#1A1C24;--text-ghost:#1E2028;--border:rgba(255,255,255,.04);--border-light:rgba(255,255,255,.03);--border-input:rgba(255,255,255,.05);--bar-bg:rgba(255,255,255,.03);transition:background .3s,color .3s}
:root.light{--bg:#F4F5F7;--bg-card:rgba(255,255,255,.9);--bg-card2:rgba(255,255,255,.85);--bg-subtle:rgba(0,0,0,.03);--bg-hover:rgba(0,0,0,.04);--bg-nav:rgba(244,245,247,.97);--bg-modal:#FFFFFF;--text:#1A1C24;--text-dim:#5A6070;--text-muted:#7A8090;--text-dark:#9AA0B0;--text-darker:#B0B5C0;--text-darkest:#C8CDD8;--text-ghost:#D8DCE4;--border:rgba(0,0,0,.08);--border-light:rgba(0,0,0,.06);--border-input:rgba(0,0,0,.1);--bar-bg:rgba(0,0,0,.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{-webkit-text-size-adjust:100%;touch-action:manipulation}body{overscroll-behavior:none;background:var(--bg);font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;min-height:100dvh;color:var(--text);transition:background .3s,color .3s}input:focus,textarea:focus{outline:none}input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}input[type=number]{-moz-appearance:textfield}button{-webkit-tap-highlight-color:transparent;border:none;cursor:pointer;font-family:inherit}::-webkit-scrollbar{display:none}#root{min-height:100dvh}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}@keyframes barIn{from{transform:scaleX(0)}to{transform:scaleX(1)}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}@keyframes toastIn{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes glow{0%,100%{text-shadow:0 0 20px rgba(201,168,76,.2)}50%{text-shadow:0 0 40px rgba(201,168,76,.5)}}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}@keyframes breathe{0%,100%{opacity:.35;transform:scale(.95)}50%{opacity:1;transform:scale(1)}}@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}@keyframes grabPulse{0%{box-shadow:0 0 0 0 rgba(201,168,76,.4)}70%{box-shadow:0 0 0 12px rgba(201,168,76,0)}100%{box-shadow:0 0 0 0 rgba(201,168,76,0)}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useCallback}=React;

// ═══ TEAM — LOADED FROM DATABASE ═══
// Fallback agents used only until DB agents are loaded
const DEFAULT_AGENTS=[
  {id:"ryan",name:"Ryan",goal:0,color:"#5B8BD4"},
  {id:"john",name:"John",goal:0,color:"#4EBF8B"},
  {id:"matt",name:"Matthew",goal:0,color:"#9B7ED8"},
  {id:"chris",name:"Christian",goal:0,color:"#D46B8C"},
  {id:"keel",name:"Keelan",goal:0,color:"#D4845B"},
  {id:"kent",name:"Kente",goal:0,color:"#4EB8B5"},
];
const AGENT_COLORS=["#5B8BD4","#4EBF8B","#9B7ED8","#D46B8C","#D4845B","#4EB8B5","#E06B56","#56A0E0","#B5D45B","#D4B85B","#8BD45B","#D45BAF"];
const RATE=0.25;
const DIAL_GOAL=600;
const API="/.netlify/functions/api";
const CHAT_API="/.netlify/functions/chat";
const IC={high:"#4EBF8B",medium:"#C9A84C",low:"#5B8BD4"};
const SC={new:"#C9A84C",grabbed:"#5B8BD4",contacted:"#9B7ED8",booked:"#4EBF8B",closed:"#2D8F65"};
const RC={prospect:"#C9A84C",contacted:"#5B8BD4",interviewed:"#9B7ED8",licensed:"#4EBF8B",dropped:"#EF4444"};
const RL={prospect:"Prospect",contacted:"Contacted",interviewed:"Interviewed",licensed:"Licensed",dropped:"Dropped"};
const CC={new:"#C9A84C",contacted:"#5B8BD4",follow_up:"#D4845B",appointment:"#9B7ED8",quoted:"#4EB8B5",closed:"#4EBF8B",lost:"#EF4444"};
const CL={new:"New",contacted:"Contacted",follow_up:"Follow Up",appointment:"Appointment",quoted:"Quoted",closed:"Closed",lost:"Lost"};
const SL={new:"New",grabbed:"Grabbed",contacted:"Contacted",booked:"Booked",closed:"Closed"};

// ═══ AUTH TOKEN (in-memory only — never persisted to storage) ═══
let _authToken = null;
const setAuthToken = (t) => { _authToken = t; };
const getAuthToken = () => _authToken;
const authHeaders = () => _authToken ? { "Authorization": `Bearer ${_authToken}` } : {};

const get=async p=>{try{const r=await fetch(`${API}?${p}`,{headers:authHeaders()});if(r.status===401){window.__handleAuthExpired&&window.__handleAuthExpired();return null;}return(await r.json()).data||null;}catch{return null;}};
const post=async(a,b)=>{try{const r=await fetch(`${API}?a=${a}`,{method:"POST",headers:{"Content-Type":"application/json",...authHeaders()},body:JSON.stringify(b)});if(r.status===401){window.__handleAuthExpired&&window.__handleAuthExpired();return{error:"Session expired"};}return await r.json();}catch(e){return{error:e.message};}};
const dayKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const todayK=()=>dayKey(new Date());
const $=n=>"$"+Number(n||0).toLocaleString("en-US");
const empty=(agentList)=>(agentList||DEFAULT_AGENTS).reduce((a,m)=>({...a,[m.id]:{ap:0,pol:0}}),{});
function rangeDays(t){const n=new Date(),d=[];if(t==="week"){const dow=n.getDay();for(let i=dow;i>=0;i--){const x=new Date(n);x.setDate(n.getDate()-i);d.push(dayKey(x));}}else if(t==="month"){for(let i=1;i<=n.getDate();i++)d.push(dayKey(new Date(n.getFullYear(),n.getMonth(),i)));}else if(t==="year"){const y=n.getFullYear();for(let m=0;m<=n.getMonth();m++){const mx=m===n.getMonth()?n.getDate():new Date(y,m+1,0).getDate();for(let i=1;i<=mx;i++)d.push(dayKey(new Date(y,m,i)));}}return d;}

// ═══ ROAST ENGINE — BRUTAL MODE ═══
function getRoast(dials,name){
  const h=new Date().getHours(),wp=Math.max(0,Math.min(h-8,9)),ep=wp>0?Math.round((DIAL_GOAL/9)*wp):0,pct=ep>0?(dials/ep)*100:dials>0?100:0;
  if(h<8)return{msg:`Morning ${name}. The day hasn't started yet — but when that clock hits 8 your ass better be dialing. Zero excuses.`,c:"#4A5060",e:"🌅"};
  if(dials>=DIAL_GOAL)return{msg:`${name} just hit ${DIAL_GOAL} dials. Absolute damn beast. That's what a real closer looks like — the rest of you should be ashamed.`,c:"#4EBF8B",e:"👑"};
  if(pct>=90)return{msg:`${name} is damn near on pace. Don't get comfortable — finish this shit strong and stop coasting.`,c:"#C9A84C",e:"💪"};
  if(pct>=70)return{msg:`${name}, what the hell? ${ep-dials} dials behind pace. Are you dialing or scrolling your damn phone? Get your ass in gear NOW.`,c:"#D4845B",e:"⚠️"};
  if(pct>=50)return{msg:`${name}... ${dials} dials? Are you kidding me? My dead grandma dials faster than your lazy ass. ${ep-dials} behind. Get the hell off your chair and DIAL.`,c:"#D46B8C",e:"🗑️"};
  if(pct>=25)return{msg:`${name}, what the hell are you doing? ${dials} out of ${ep}?! This is pathetic. You're dead weight and the whole damn team knows it. Wake the hell up or get out.`,c:"#D46B8C",e:"💀"};
  if(dials>0)return{msg:`${name}. ${dials} damn dials? That's not a sales effort, that's a joke. A toddler with a toy phone would outwork your sorry ass. Should be at ${ep}. PICK UP THE DAMN PHONE.`,c:"#EF4444",e:"☠️"};
  return{msg:`${name} has ZERO dials. Not a single damn call. What the hell are you even doing here? You're wasting everyone's time including your own. Start dialing right now or pack your shit and leave. This is Land of Legacy — we don't carry dead weight.`,c:"#EF4444",e:"🚨"};
}

// ═══ KPI INPUT WITH AUTO-ADD ═══
function KF({label,value,onChange,showQuick}){
  const[ed,setEd]=useState(false);const[v,setV]=useState("");
  return(<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
    <div style={{fontSize:7,fontWeight:700,letterSpacing:1.2,color:"var(--text-darker)",fontFamily:"'IBM Plex Mono',monospace",textTransform:"uppercase"}}>{label}</div>
    {ed?<input autoFocus type="number" inputMode="numeric" value={v} onChange={e=>setV(e.target.value)} onBlur={()=>{onChange(parseInt(v)||0);setEd(false);}} onKeyDown={e=>{if(e.key==="Enter")e.target.blur();}} style={B.numIn}/>
    :<button onClick={()=>{setV(String(value));setEd(true);}} style={{...B.numBtn,color:value>0?"var(--text)":"var(--text-darkest)",fontSize:20,padding:"10px 14px"}}>{value}</button>}
    {showQuick&&<div style={{display:"flex",gap:4,marginTop:2}}>
      {[1,5,10,25].map(n=><button key={n} onClick={()=>onChange(value+n)} style={{padding:"4px 8px",borderRadius:8,background:"rgba(201,168,76,.06)",border:"1px solid rgba(201,168,76,.12)",color:"#C9A84C",fontSize:9,fontWeight:700,fontFamily:"'IBM Plex Mono',monospace"}}>+{n}</button>)}
    </div>}
  </div>);
}

// ═══ SCREENS ═══
function Loading(){return(<div style={{minHeight:"100dvh",background:"var(--bg)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:24}}><div style={{position:"relative",width:80,height:80,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{position:"absolute",inset:0,border:"2px solid rgba(201,168,76,.08)",borderTopColor:"rgba(201,168,76,.5)",borderRadius:"50%",animation:"spin 1.2s linear infinite"}}/><span style={{fontSize:32,color:"#C9A84C",animation:"breathe 2.5s ease infinite"}}>◈</span></div><div style={{fontSize:18,fontWeight:900,letterSpacing:6,color:"#C9A84C"}}>LAND OF LEGACY</div><div style={{width:140,height:2,background:"rgba(255,255,255,.04)",overflow:"hidden",borderRadius:2}}><div style={{width:"100%",height:"100%",background:"linear-gradient(90deg,transparent,#C9A84C,transparent)",backgroundSize:"200% 100%",animation:"shimmer 1.5s ease infinite"}}/></div></div>);}

function Lock({onLogin,agents}){
  const[pin,setPin]=useState("");const[err,setErr]=useState(false);const[pr,setPr]=useState(null);const[checking,setChecking]=useState(false);
  const go=async p=>{const v=p||pin;if(checking)return;setChecking(true);try{const r=await fetch(`${API}?a=login`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({pin:v})});const d=await r.json();if(d.data&&d.data.token){setAuthToken(d.data.token);onLogin(d.data.role,d.data.role==="admin"?null:d.data.agent?.id);}else{setErr(true);setPin("");}}catch{setErr(true);setPin("");}setChecking(false);};
  const tap=n=>{setPr(n);setErr(false);setTimeout(()=>setPr(null),100);const nx=pin+n;setPin(nx);if(nx.length===4)setTimeout(()=>go(nx),120);};
  return(<div style={{minHeight:"100dvh",background:"var(--bg)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative",overflow:"hidden"}}>
    <div style={{position:"absolute",top:"-30%",left:"50%",transform:"translateX(-50%)",width:300,height:300,borderRadius:"50%",background:"radial-gradient(circle,rgba(201,168,76,.06) 0%,transparent 70%)"}}/>
    <div style={{textAlign:"center",marginBottom:40}}><div style={{fontSize:52,color:"#C9A84C",animation:"glow 3s ease infinite",marginBottom:10}}>◈</div><h1 style={{fontSize:20,fontWeight:900,letterSpacing:8,color:"#C9A84C"}}>LAND OF LEGACY</h1><div style={{fontSize:8,letterSpacing:4,color:"var(--text-dark)",fontWeight:700,marginTop:6,fontFamily:"'IBM Plex Mono',monospace"}}>TEAM PERFORMANCE SUITE</div></div>
    <div style={{display:"flex",gap:18,marginBottom:10,height:32,alignItems:"center"}}>{[0,1,2,3].map(i=>(<div key={i} style={{width:16,height:16,borderRadius:"50%",border:"1.5px solid rgba(201,168,76,.15)",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:10,height:10,borderRadius:"50%",background:i<pin.length?"#C9A84C":"transparent",boxShadow:i<pin.length?"0 0 12px rgba(201,168,76,.5)":"none",transform:i<pin.length?"scale(1)":"scale(0)",transition:"all .15s"}}/></div>))}</div>
    {err?<div style={{fontSize:13,color:"#D46B6B",fontWeight:600,height:20,marginBottom:6,animation:"shake .4s ease"}}>Invalid code</div>:<div style={{fontSize:13,color:"var(--text-darker)",fontWeight:500,height:20,marginBottom:6}}>Enter your 4-digit PIN</div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,width:"100%",maxWidth:270}}>{[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((n,i)=>(n===""?<div key={i}/>:<button key={i} onClick={()=>n==="⌫"?(()=>{setPin(pin.slice(0,-1));setErr(false);})():tap(String(n))} style={{width:"100%",aspectRatio:"1.35",borderRadius:16,background:pr===String(n)?"rgba(201,168,76,.1)":"rgba(255,255,255,.02)",border:"1px solid var(--border)",color:"var(--text)",display:"flex",alignItems:"center",justifyContent:"center",transition:"all .12s"}}><span style={n==="⌫"?{fontSize:18,color:"var(--text-dim)"}:{fontSize:24}}>{n}</span></button>))}</div>
  </div>);
}

// ═══ MAIN APP ═══
function App(){
  const[role,setRole]=useState(null);const[me,setMe]=useState(null);const[page,setPage]=useState("kpi");
  const[agents,setAgents]=useState(DEFAULT_AGENTS);
  const[leads,setLeads]=useState([]);const[myLeads,setMyLeads]=useState([]);const[lstats,setLstats]=useState({});
  const[data,setData]=useState(null);const[allDays,setAllDays]=useState({});const[period,setPeriod]=useState("day");
  const[kpi,setKpi]=useState({dials:0,contacts:0,appointments:0,quotes:0,apps_submitted:0});const[teamKpi,setTeamKpi]=useState([]);
  const[editing,setEditing]=useState(null);const[editVal,setEditVal]=useState("");
  const[anim,setAnim]=useState(false);const[toast,setToast]=useState(null);const[loading,setLoading]=useState(false);
  const[showAdd,setShowAdd]=useState(false);const[ltab,setLtab]=useState("feed");
  const[leadLock,setLeadLock]=useState({dials:0,unlocked:false,maxLeads:0,grabbedToday:0,remaining:0,highIntentOnly:false,salesToday:0});
  const[recruits,setRecruits]=useState([]);const[rstats,setRstats]=useState({});const[showAddRecruit,setShowAddRecruit]=useState(false);const[showImportRecruits,setShowImportRecruits]=useState(false);
  const[crmLeads,setCrmLeads]=useState([]);const[crmStats,setCrmStats]=useState({});const[showAddCrm,setShowAddCrm]=useState(false);const[showImportCrm,setShowImportCrm]=useState(false);const[crmFilter,setCrmFilter]=useState("all");const[crmEdit,setCrmEdit]=useState(null);
  const[chatMsgs,setChatMsgs]=useState([{role:"assistant",content:"Hey! I'm Legacy AI — your insurance sales assistant. Ask me about scripts, objection handling, products, or anything to help you close more deals."}]);const[chatInput,setChatInput]=useState("");const[chatLoading,setChatLoading]=useState(false);
  const[showManageTeam,setShowManageTeam]=useState(false);
  const[darkMode,setDarkMode]=useState(true);
  const toggleTheme=()=>{setDarkMode(d=>{const next=!d;document.documentElement.classList.toggle("light",!next);return next;});};


  const sendChat=async()=>{if(!chatInput.trim()||chatLoading)return;const msg=chatInput.trim();setChatInput("");const newMsgs=[...chatMsgs,{role:"user",content:msg}];setChatMsgs(newMsgs);setChatLoading(true);try{const r=await fetch(CHAT_API,{method:"POST",headers:{"Content-Type":"application/json",...authHeaders()},body:JSON.stringify({message:msg,history:newMsgs.slice(-20)})});const d=await r.json();if(d.reply)setChatMsgs(m=>[...m,{role:"assistant",content:d.reply}]);else setChatMsgs(m=>[...m,{role:"assistant",content:"Sorry, I couldn't process that. Try again!"}]);}catch{setChatMsgs(m=>[...m,{role:"assistant",content:"Connection error. Please try again."}]);}setChatLoading(false);};

  useEffect(()=>{const el=document.getElementById("chat-scroll");if(el)el.scrollTop=el.scrollHeight;},[chatMsgs,chatLoading]);

  const td=todayK();const isAdmin=role==="admin";const AGENTS=agents;const myAgent=AGENTS.find(a=>a.id===me);
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(null),2200);};

  useEffect(()=>{fetch(`${API}?a=init`).catch(()=>{});},[]);

  // Auto-logout on expired session
  useEffect(()=>{window.__handleAuthExpired=()=>{setAuthToken(null);setRole(null);setMe(null);setData(null);};return()=>{window.__handleAuthExpired=null;};},[]);

  const refresh=useCallback(async()=>{
    // Load agents list (authenticated)
    const agData=await get("a=agents-list");if(agData&&agData.length)setAgents(agData);
    const leadsQ=me&&me!=="admin"?`a=leads-list&status=new&agent=${me}&date=${td}`:"a=leads-list&status=new";
    const[nl,ml,ls]=await Promise.all([get(leadsQ),me?get(`a=leads-my&agent=${me}`):null,get("a=leads-stats")]);
    setLeads(nl||[]);if(ml)setMyLeads(ml);setLstats(ls||{});
    if(me){const k=await get(`a=kpi-get&agent=${me}&date=${td}`);if(k)setKpi({dials:k.dials||0,contacts:k.contacts||0,appointments:k.appointments||0,quotes:k.quotes||0,apps_submitted:k.apps_submitted||0});}
    if(me){const lk=await get(`a=leads-lock-check&agent=${me}&date=${td}`);if(lk)setLeadLock(lk);}
    const[rlist,rs]=await Promise.all([
  isAdmin ? get("a=recruits-list") : get(`a=recruits-list&agent=${me}`),
  isAdmin ? get("a=recruits-stats") : get(`a=recruits-stats&agent=${me}`)
]);
    if(me){const[cl,cs]=await Promise.all([get(`a=crm-list&agent=${me}`),get(`a=crm-stats&agent=${me}`)]);setCrmLeads(cl||[]);setCrmStats(cs||{});}
    setTeamKpi(await get(`a=kpi-team&date=${td}`)||[]);
  },[me,td]);

  const onLogin=useCallback(async(r,aid)=>{
    setRole(r);setMe(aid);setLoading(true);
    const t=await post("sales-get",{date:td});setData(t.data?{...empty(agents),...t.data}:empty(agents));
    const all=await post("sales-all",{});setAllDays(all.data||{});
    setLoading(false);setTimeout(()=>setAnim(true),60);
  },[]);

  useEffect(()=>{if(role)refresh();},[role,refresh]);
  useEffect(()=>{if(!role)return;const iv=setInterval(refresh,8000);return()=>clearInterval(iv);},[role,refresh]);
  useEffect(()=>{if(!role||loading)return;const iv=setInterval(async()=>{const d=await post("sales-get",{date:td});if(d.data)setData(p=>({...empty(agents),...d.data}));},10000);return()=>clearInterval(iv);},[role,loading,agents]);

  const saveSales=async nd=>{setData(nd);await post("sales-save",{date:td,data:nd});};
  const startEdit=(mid,f)=>{setEditing(`${mid}-${f}`);setEditVal("");};
  const commitS=(mid,f)=>{const v=parseFloat(editVal)||0;saveSales({...data,[mid]:{...data[mid],[f]:v}});setEditing(null);showToast(`${AGENTS.find(a=>a.id===mid)?.name} updated`);};
  const onKey=(e,mid,f)=>{if(e.key==="Enter"){e.target.blur();commitS(mid,f);}if(e.key==="Escape")setEditing(null);};
  const getAgg=useCallback(t=>{if(t==="day")return data||empty(agents);const days=rangeDays(t);const agg=empty(agents);const src={...allDays,[td]:data};for(const d of days){const dd=src[d];if(dd)for(const m of AGENTS){agg[m.id].ap+=(dd[m.id]?.ap||0);agg[m.id].pol+=(dd[m.id]?.pol||0);}}return agg;},[data,allDays,agents]);
  const saveKpi=async(f,v)=>{const nk={...kpi,[f]:v};setKpi(nk);await post("kpi-save",{agent_id:me||"admin",date_key:td,...nk});showToast("KPI updated");if(me){const lk=await get(`a=leads-lock-check&agent=${me}&date=${td}`);if(lk)setLeadLock(lk);}};
  const handleGrab=async id=>{const r=await post("leads-grab",{id,agent:me||"admin",date:td});if(r.error){showToast(r.error);return;}showToast("Lead grabbed!");refresh();};
  const handleLU=async(id,u)=>{await post("leads-update",{id,...u});refresh();};
  const handleAdd=async d=>{await post("leads-add",d);showToast("Lead added!");refresh();};
  const handleAddRecruit=async d=>{await post("recruits-add",{...d,agent_id:me||"admin"});showToast("Recruit added!");refresh();};
  const handleRecruitUpdate=async(id,u)=>{await post("recruits-update",{id,...u});refresh();};
  const handleRecruitDelete=async id=>{await post("recruits-delete",{id});showToast("Recruit removed");refresh();};

    {/* ═══ RECRUITING PAGE ═══ */}

              <div><a href={`tel:${l.name||""}`} style={{fontSize:15,fontWeight:700,color:"var(--text)",textDecoration:"none",cursor:"pointer"}}>{l.name||"Unknown"}</a>{l.source&&<div style={{fontSize:10,color:"var(--text-muted)",fontFamily:"'IBM Plex Mono',monospace"}}>{l.source}</div>}</div>
              <span style={{fontSize:8,fontWeight:700,letterSpacing:1,color:CC[l.status],background:`${CC[l.status]}12`,padding:"3px 8px",borderRadius:6,fontFamily:"'IBM Plex Mono',monospace",textTransform:"uppercase",height:"fit-content"}}>{CL[l.status]||l.status}</span>

          </div>
        </div>)}
        {crmLeads.filter(l=>crmFilter==="all"||l.status===crmFilter).length===0&&<div style={{textAlign:"center",padding:40,color:"var(--text-ghost)",fontSize:14}}>{crmFilter==="all"?"No leads yet — add or import leads to get started!":"No leads with this status"}</div>}
      </div>
    </div>}
    {page==="crm"&&isAdmin&&<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}><div style={{textAlign:"center",color:"var(--text-muted)"}}><div style={{fontSize:40,marginBottom:16}}>🔒</div><div style={{fontSize:16,fontWeight:700}}>Agent CRM Only</div><div style={{fontSize:12,marginTop:8,color:"var(--text-darker)"}}>The CRM is private to each agent. Log in with an agent PIN to access.</div></div></div>}

    {page==="chat"&&<div style={{flex:1,display:"flex",flexDirection:"column",paddingBottom:80}}>
      <div style={{padding:"12px 16px 8px"}}><div style={{fontSize:16,fontWeight:800,color:"#C9A84C"}}>Legacy AI</div><div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>Your insurance sales assistant — powered by Claude</div></div>

        </div>)}

function ImportCrmForm({onImport,onClose}){
  const[raw,setRaw]=useState("");const[parsed,setParsed]=useState([]);const[err,setErr]=useState("");const[mode,setMode]=useState("paste");
  const parseText=(text)=>{
    if(!text.trim()){setErr("Paste your list or upload a file");return;}

    const firstLine=lines[0].toLowerCase();
    const hasHeader=firstLine.includes("name")&&(firstLine.includes("phone")||firstLine.includes("email"));
    const dataLines=hasHeader?lines.slice(1):lines;
    const results=[];
    for(const line of dataLines){const parts=line.split(/[,\t]/).map(s=>s.trim());if(parts.length>=1&&parts[0]){results.push({name:parts[0],phone:parts[1]||"",email:parts[2]||"",company:parts[3]||"",location:parts[4]||"",source:parts[5]||"",notes:parts[6]||""});}}

    {err&&<div style={{fontSize:12,color:"#EF4444",marginTop:8}}>{err}</div>}
    {!parsed.length?<button onClick={()=>parseText(raw)} style={{width:"100%",marginTop:12,padding:14,borderRadius:14,background:"linear-gradient(135deg,rgba(91,139,212,.15),rgba(91,139,212,.08))",border:"1px solid rgba(91,139,212,.2)",color:"#5B8BD4",fontSize:15,fontWeight:800}}>Preview Import</button>

        </div>)}

        </div>
        {confirm===ag.id?<div style={{display:"flex",gap:6}}>
          <button onClick={()=>{onDelete(ag.id);setConfirm(null);}} style={{padding:"5px 10px",borderRadius:6,background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.2)",color:"#EF4444",fontSize:10,fontWeight:700}}>Confirm</button>
          <button onClick={()=>setConfirm(null)} style={{padding:"5px 10px",borderRadius:6,background:"var(--bar-bg)",border:"1px solid var(--border-input)",color:"var(--text-dim)",fontSize:10,fontWeight:700}}>Cancel</button>
        </div>
        :<button onClick={()=>setConfirm(ag.id)} style={{padding:"5px 10px",borderRadius:6,background:"rgba(239,68,68,.04)",border:"1px solid rgba(239,68,68,.08)",color:"#EF4444",fontSize:10,fontWeight:700}}>Remove</button>}
      </div>)}
    </div>

    {/* ADD NEW AGENT */}
    {!showAdd?<button onClick={()=>setShowAdd(true)} style={{width:"100%",padding:14,borderRadius:14,background:"linear-gradient(135deg,rgba(201,168,76,.12),rgba(201,168,76,.06))",border:"1px solid rgba(201,168,76,.2)",color:"#C9A84C",fontSize:15,fontWeight:800}}>+ Add New Agent</button>
    :<div style={{background:"var(--bg-hover)",borderRadius:14,padding:16,border:"1px solid rgba(201,168,76,.1)"}}>
      <div style={{fontSize:14,fontWeight:700,color:"#C9A84C",marginBottom:12}}>Add New Team Member</div>
      <input value={name} onChange={e=>setName(e.target.value)} placeholder="Agent name" style={B.modalIn}/>
      <input value={pin} onChange={e=>{const v=e.target.value.replace(/\D/g,"").slice(0,4);setPin(v);}} placeholder="4-digit PIN code" inputMode="numeric" maxLength={4} style={{...B.modalIn,marginTop:8,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:8,textAlign:"center",fontSize:20}}/>
      <div style={{fontSize:10,color:"var(--text-muted)",marginTop:6,textAlign:"center"}}>This PIN is what the agent will use to log in</div>
      {err&&<div style={{fontSize:12,color:"#EF4444",marginTop:8,textAlign:"center"}}>{err}</div>}
      <div style={{display:"flex",gap:8,marginTop:12}}>
        <button onClick={doAdd} style={{flex:1,padding:12,borderRadius:12,background:"linear-gradient(135deg,rgba(78,191,139,.15),rgba(78,191,139,.08))",border:"1px solid rgba(78,191,139,.2)",color:"#4EBF8B",fontSize:14,fontWeight:800}}>Add Agent</button>
        <button onClick={()=>{setShowAdd(false);setErr("");setName("");setPin("");}} style={{flex:1,padding:12,borderRadius:12,background:"var(--bg-hover)",border:"1px solid var(--border-input)",color:"var(--text-dim)",fontSize:14,fontWeight:700}}>Cancel</button>
      </div>
    </div>}
  </div>);
}

const B={card:{background:"var(--bg-card)",borderRadius:18,padding:16,border:"1px solid var(--border)"},row:{display:"flex",alignItems:"center",justifyContent:"space-between",background:"var(--bg-card2)",borderRadius:14,padding:"14px 16px",border:"1px solid var(--border-light)",marginBottom:8},numBtn:{background:"var(--bg-subtle)",border:"1px solid var(--border)",borderRadius:14,padding:"13px 16px",fontFamily:"'IBM Plex Mono',monospace",fontSize:24,fontWeight:700,width:"100%",maxWidth:160,textAlign:"center"},numIn:{background:"rgba(201,168,76,.06)",border:"2px solid rgba(201,168,76,.25)",borderRadius:14,padding:"13px 8px",fontFamily:"'IBM Plex Mono',monospace",fontSize:24,fontWeight:700,color:"#C9A84C",width:"100%",maxWidth:160,textAlign:"center",WebkitAppearance:"none"},modalIn:{width:"100%",padding:"12px 14px",borderRadius:12,background:"var(--bg-hover)",border:"1px solid var(--border-input)",color:"var(--text)",fontSize:14,fontFamily:"'Outfit',sans-serif"}};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
